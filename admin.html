<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Live Vote 2026</title>
    <link rel="icon" type="image/png" href="https://www.google.com/s2/favicons?domain=usu.ac.id&sz=128">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; color: white; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Auth Section -->
    <div id="auth-section" class="max-w-md mx-auto mt-20 bg-gray-900 border border-white/10 p-8 rounded-2xl shadow-2xl text-center">
        <h2 class="text-3xl font-bold mb-6">Login Admin</h2>
        <input type="password" id="pin-input" class="w-full bg-black/50 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 mb-4 text-center tracking-widest text-xl" placeholder="Masukkan PIN">
        <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-colors">Masuk</button>
    </div>

    <!-- Admin Panel (Hidden initially) -->
    <div id="admin-panel" class="max-w-4xl mx-auto hidden">
        <header class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-[#00F0FF] to-[#FFD700]">PANITIA VOTE</h1>
            <a href="/" target="_blank" class="text-blue-400 hover:text-blue-300 text-sm font-semibold underline">Buka Layar Publik &nearr;</a>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8" id="admin-candidates-container">
            <div class="col-span-1 md:col-span-2 text-center text-gray-500 animate-pulse">Memuat data...</div>
        </div>

        <!-- Invalid Votes Section -->
        <div class="bg-red-900/20 border border-red-500/30 p-6 rounded-2xl flex flex-col relative items-center justify-center mb-8">
            <h2 class="text-2xl font-bold text-red-500 mb-1">SUARA TIDAK SAH</h2>
            <div class="text-5xl font-black text-white mb-6" id="invalid-votes-admin">0</div>
            
            <div class="flex gap-4 w-full max-w-sm">
                <button onclick="voteInvalid('decrement')" class="flex-1 bg-red-900/50 hover:bg-red-900 text-red-400 border border-red-500/50 font-bold py-3 rounded-xl transition-all active:scale-95 text-xl">
                    -1
                </button>
                <button onclick="voteInvalid('increment')" class="flex-[3] bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-xl transition-all active:scale-95 text-xl">
                    +1 SUARA
                </button>
            </div>
        </div>

        <hr class="border-gray-800 my-8">

        <!-- Reset & Export Section -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Export Section -->
            <div class="bg-green-900/10 border border-green-900/30 p-6 rounded-2xl text-center flex flex-col justify-center">
                <h3 class="text-xl font-bold text-green-500 mb-2">LAPORAN HASIL</h3>
                <p class="text-sm text-gray-400 mb-4">Unduh rekapitulasi perolehan suara dalam format Excel (CSV).</p>
                <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-xl transition-all active:scale-95 shadow-lg flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    UNDUH EXCEL (CSV)
                </button>
            </div>

            <!-- Reset Section -->
            <div class="bg-red-900/10 border border-red-900/30 p-6 rounded-2xl text-center flex flex-col justify-center">
                <h3 class="text-xl font-bold text-red-500 mb-2">ZONA BERBAHAYA</h3>
                <p class="text-sm text-gray-400 mb-4">Mereset akan menghapus seluruh data suara (Sah & Tidak Sah) menjadi 0.</p>
                <button id="reset-btn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-8 rounded-xl transition-all active:scale-95 shadow-lg flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    RESET SELURUH SUARA
                </button>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
