<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Live Vote 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; color: white; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Auth Section -->
    <div id="auth-section" class="max-w-md mx-auto mt-20 bg-gray-900 border border-white/10 p-8 rounded-2xl shadow-2xl text-center">
        <h2 class="text-3xl font-bold mb-6">Login Admin</h2>
        <input type="password" id="pin-input" class="w-full bg-black/50 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 mb-4 text-center tracking-widest text-xl" placeholder="Masukkan PIN">
        <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-colors">Masuk</button>
    </div>

    <!-- Admin Panel (Hidden initially) -->
    <div id="admin-panel" class="max-w-4xl mx-auto hidden">
        <header class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-[#00F0FF] to-[#FFD700]">PANITIA VOTE</h1>
            <a href="/" target="_blank" class="text-blue-400 hover:text-blue-300 text-sm font-semibold underline">Buka Layar Publik &nearr;</a>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12" id="admin-candidates-container">
            <div class="col-span-1 md:col-span-2 text-center text-gray-500 animate-pulse">Memuat data...</div>
        </div>

        <hr class="border-gray-800 my-8">

        <!-- Reset Section -->
        <div class="bg-red-900/10 border border-red-900/30 p-6 rounded-2xl text-center">
            <h3 class="text-xl font-bold text-red-500 mb-2">ZONA BERBAHAYA</h3>
            <p class="text-sm text-gray-400 mb-4">Mereset suara akan menghapus seluruh data yang sudah masuk ke angka 0.</p>
            <button id="reset-btn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-8 rounded-xl transition-all active:scale-95 shadow-lg">RESET SELURUH SUARA KE 0</button>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
