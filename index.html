<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Vote Dashboard - Mewah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gold: {
                            DEFAULT: '#FFD700',
                            glow: 'rgba(255, 215, 0, 0.5)'
                        },
                        neonBlue: {
                            DEFAULT: '#00F0FF',
                            glow: 'rgba(0, 240, 255, 0.5)'
                        },
                        darkBg: '#0b0f19',
                        glass: 'rgba(255, 255, 255, 0.05)'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-darkBg text-white min-h-screen font-sans flex flex-col items-center py-12 relative overflow-hidden">
    
    <!-- Background glow effects -->
    <div class="absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] bg-neonBlue/20 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] bg-gold/20 rounded-full blur-[120px] pointer-events-none"></div>

    <header class="text-center z-10 mb-12">
        <h1 class="text-5xl md:text-6xl font-outfit font-black tracking-tight mb-4 text-transparent bg-clip-text bg-gradient-to-r from-neonBlue to-gold drop-shadow-lg">
            LIVE VOTE 2026
        </h1>
        <p class="text-gray-400 text-lg md:text-xl font-light tracking-wide">
            Real-time Election Dashboard
        </p>
    </header>

    <main class="w-full max-w-6xl px-4 z-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-16" id="candidates-container">
            <!-- Loading state -->
            <div class="col-span-1 md:col-span-2 text-center text-gray-500 animate-pulse">
                Menghubungkan ke server...
            </div>
        </div>
    </main>

    <!-- Template for Candidate Card -->
    <template id="candidate-template">
        <div class="candidate-card glass-panel rounded-3xl p-8 md:p-10 flex flex-col items-center relative overflow-hidden group transition-all duration-500 hover:-translate-y-2 hover:shadow-2xl">
            <!-- Decorator line -->
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-white to-transparent opacity-30 group-hover:opacity-100 transition-opacity"></div>
            
            <h2 class="candidate-name text-3xl font-outfit font-bold mb-2 uppercase tracking-wider text-white"></h2>
            
            <div class="vote-count-container my-8 relative">
                <div class="absolute inset-0 bg-white/5 blur-xl rounded-full"></div>
                <div class="vote-count text-7xl md:text-8xl font-black font-outfit text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-500">
                    0
                </div>
            </div>

            <p class="text-xs uppercase tracking-[0.2em] text-gray-500 mb-6 font-semibold">Suara Masuk</p>

            <!-- Tally Container -->
            <div class="tally-container w-full min-h-[100px] flex flex-wrap justify-center gap-4 mb-8 bg-black/20 rounded-xl p-4 border border-white/5 shadow-inner">
                <!-- Tally marks will be injected here -->
            </div>

            <button class="vote-btn relative overflow-hidden w-full py-4 rounded-xl font-bold text-lg tracking-wider transition-all duration-300 transform active:scale-95 border border-white/10 hover:border-white/30 group/btn">
                <span class="relative z-10 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5 transition-transform group-hover/btn:-translate-y-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
                    BERI SUARA
                </span>
                <div class="absolute inset-0 bg-gradient-to-r opacity-0 group-hover/btn:opacity-20 transition-opacity duration-300"></div>
            </button>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
