<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Vote Dashboard - Publik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gold: { DEFAULT: '#FFD700', glow: 'rgba(255, 215, 0, 0.5)' },
                        neonBlue: { DEFAULT: '#00F0FF', glow: 'rgba(0, 240, 255, 0.5)' },
                        darkBg: '#0b0f19',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-darkBg text-white min-h-screen font-sans flex flex-col items-center py-8 md:py-12 relative overflow-hidden">
    
    <div class="absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] bg-neonBlue/20 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] bg-gold/20 rounded-full blur-[120px] pointer-events-none"></div>

    <header class="text-center z-10 mb-8 w-full max-w-6xl mx-auto px-4">
        <h1 class="text-5xl md:text-6xl font-outfit font-black tracking-tight mb-2 text-transparent bg-clip-text bg-gradient-to-r from-neonBlue to-gold drop-shadow-lg">
            LIVE VOTE 2026
        </h1>
        <p class="text-gray-400 text-lg md:text-xl font-light tracking-wide mb-6">
            Real-time Election Dashboard
        </p>
        
        <!-- Total Keseluruhan Suara -->
        <div class="inline-block bg-white/5 border border-white/10 rounded-2xl px-8 py-4 backdrop-blur-md shadow-2xl">
            <p class="text-sm text-gray-400 uppercase tracking-widest font-semibold mb-1">TOTAL SUARA MASUK</p>
            <div id="total-all-votes" class="text-5xl font-black font-outfit text-white">0</div>
        </div>
    </header>

    <main class="w-full max-w-6xl px-4 z-10 flex-1 flex flex-col justify-center">
        <!-- Progress Bar -->
        <div class="w-full h-8 bg-gray-800 rounded-full mb-12 overflow-hidden flex relative shadow-lg border border-white/10 opacity-0 transition-opacity duration-500" id="progress-bar-container">
            <div id="progress-c1" class="h-full bg-neonBlue transition-all duration-1000 ease-out flex items-center justify-start px-4 text-sm font-bold text-black" style="width: 50%;">50%</div>
            <div id="progress-c2" class="h-full bg-gold transition-all duration-1000 ease-out flex items-center justify-end px-4 text-sm font-bold text-black" style="width: 50%;">50%</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-16" id="candidates-container">
            <div class="col-span-1 md:col-span-2 text-center text-gray-500 animate-pulse">
                Menghubungkan ke server...
            </div>
        </div>
    </main>

    <!-- Template for Candidate Card (Public) -->
    <template id="candidate-template">
        <div class="candidate-card glass-panel rounded-3xl p-6 md:p-8 flex flex-col items-center relative overflow-hidden group transition-all duration-500">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-white to-transparent opacity-30"></div>
            
            <!-- Photo Container -->
            <div class="w-32 h-32 md:w-40 md:h-40 rounded-full overflow-hidden mb-6 border-4 border-white/10 shadow-2xl relative candidate-photo-container">
                <img src="" alt="Foto Kandidat" class="candidate-photo w-full h-full object-cover">
                <div class="absolute inset-0 bg-black/50 flex items-center justify-center photo-placeholder">
                    <svg class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </div>
            </div>

            <h2 class="candidate-name text-3xl md:text-4xl font-outfit font-bold mb-1 uppercase tracking-wider text-white text-center"></h2>
            <div class="candidate-pct text-lg text-gray-400 font-semibold mb-6">0%</div>
            
            <div class="vote-count-container my-4 relative">
                <div class="absolute inset-0 bg-white/5 blur-xl rounded-full"></div>
                <div class="vote-count text-7xl md:text-8xl font-black font-outfit text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-500">
                    0
                </div>
            </div>

            <p class="text-xs uppercase tracking-[0.2em] text-gray-500 mb-6 font-semibold">Suara</p>

            <!-- Tally Container -->
            <div class="tally-container w-full min-h-[100px] flex flex-wrap justify-center gap-4 bg-black/20 rounded-xl p-4 border border-white/5 shadow-inner">
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
